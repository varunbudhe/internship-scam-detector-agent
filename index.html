<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internship Scam Detector</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #111;
    }

    p {
      color: #555;
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 14px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 14px;
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .output {
      margin-top: 22px;
      padding: 18px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #ddd;
      white-space: pre-line;
      font-size: 15px;
      line-height: 1.6;
    }

    .warning {
      color: #b45309;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Internship Scam Detector</h1>

    <p>
      Paste full internship or job details below. The detector checks for scam signals like
      payment requests, fake urgency, unofficial emails, no interview process, and unrealistic offers.
    </p>

    <textarea id="input" placeholder="Example:
Company: GrowthHack Academy
Role: Data Analyst Intern
Stipend: ₹30,000/month
Selection: Direct selection, no interview
Condition: ₹5000 training fee before joining
Contact: WhatsApp only
Email: growthhackjobs@gmail.com"></textarea>

    <button onclick="analyzeOffer()">Analyze Offer</button>

    <div id="output" class="output">
      Result will appear here after analysis.
    </div>
  </div>
